<script>
const imgs = Array.from(document.querySelectorAll('.g-item img')).map(i=>i.src);
let cur = 0;
function openLb(i){cur=i;document.getElementById('lb-img').src=imgs[i];document.getElementById('lb').classList.add('active');document.body.style.overflow='hidden'}
function closeLb(){document.getElementById('lb').classList.remove('active');document.body.style.overflow=''}
function closeLbOutside(e){if(e.target===document.getElementById('lb'))closeLb()}
function shiftLb(d){cur=(cur+d+imgs.length)%imgs.length;document.getElementById('lb-img').src=imgs[cur]}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('active'))return;if(e.key==='Escape')closeLb();if(e.key==='ArrowLeft')shiftLb(-1);if(e.key==='ArrowRight')shiftLb(1)});
(function(){var nav=document.getElementById('nav');if(!nav)return;window.addEventListener('scroll',function(){nav.classList.toggle('nav-s',window.scrollY>50);},{passive:true});})();
</script>
